name: Build OnePersonClaw

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install customtkinter pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed `
            --name "OnePersonClaw" `
            --hidden-import=customtkinter `
        --hidden-import=CTkPopupMenu `
        main.py
        continue-on-error: false

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: OnePersonClaw-Windows
          path: dist/OnePersonClaw.exe

  release:
    name: Create Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: OnePersonClaw-Windows
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OnePersonClaw ${{ github.ref_name }}"
          body: |
            ## OnePersonClaw ${{ github.ref_name }}

            一个人，一套爪子，干掉一个团队

            ### 下载
            - **Windows**: `OnePersonClaw.exe` — 直接双击运行

            ---
            by 常云举19966519194
          files: release/OnePersonClaw.exe
          draft: false
          prerelease: false
